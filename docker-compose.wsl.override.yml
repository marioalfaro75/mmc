# WSL-only overrides.
#
# Auto-applied by scripts/deploy.sh when /proc/version reports a Microsoft
# kernel, and picked up by the UI via ui/src/lib/docker.ts OVERRIDE_FILES.
#
# Exposes /mnt so Sonarr, Radarr and the UI can read media off the Windows
# drives that WSL mounts at /mnt/c, /mnt/d, etc. On bare-metal Linux there is
# no equivalent convention, so /mnt is left unmounted by default.

services:
  sonarr:
    volumes:
      - /mnt:/mnt

  radarr:
    volumes:
      - /mnt:/mnt

  media-ui:
    volumes:
      - /mnt:/mnt
